<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Medical Record</title>
<style>
  :root{
    --teal-dark:#0f6f66;
    --teal:#17a398;
    --mint-bg:#e4f5f3;
    --green-badge-bg:#e5f7e9;
    --green-badge-text:#2fa84f;
    --ink:#1c2b2a;
    --muted:#7c8c8a;
    --line:#eaefee;
    --bg:#f4f7f6;
    --mild-bg:#e5f7e9; --mild-text:#2fa84f;
    --mod-bg:#fdf3dc; --mod-text:#c98a0f;
    --sev-bg:#fbe6e6; --sev-text:#d94b4b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Helvetica Neue', Arial, sans-serif;
    background:var(--bg);
    color:var(--ink);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  .screen{
    width:100%;
    max-width:420px;
    background:#ffffff;
    box-shadow:0 4px 24px rgba(15,60,55,.06);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  .header{
    background:var(--teal-dark);
    color:#fff;
    padding:18px 20px 16px 20px;
  }
  .header-top{display:flex;align-items:center;gap:12px;}
  .back-btn{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:0;line-height:1;}
  .header-top h1{font-size:16px;margin:0;font-weight:700;flex:1;}
  .header-top .sync-icon{opacity:.9;cursor:pointer;}
  .header-sub{font-size:11.5px;opacity:.8;margin:6px 0 0 30px;}

  .offline-banner{
    background:var(--mint-bg);
    color:var(--teal-dark);
    font-size:11.5px;
    padding:10px 20px;
    display:flex;
    align-items:center;
    gap:8px;
  }

  .body{padding:18px 20px 24px 20px;flex:1;}

  .patient-card{
    display:flex;align-items:center;gap:12px;
    background:#fff;border:1px solid var(--line);border-radius:14px;
    padding:12px 14px;margin-bottom:22px;
    box-shadow:0 2px 10px rgba(20,30,40,0.05);
  }
  .patient-avatar{
    width:40px;height:40px;border-radius:50%;flex-shrink:0;
    background:var(--mint-bg);color:var(--teal-dark);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;
  }
  .patient-info{flex:1;}
  .patient-info .name-row{display:flex;align-items:center;gap:6px;}
  .patient-info h4{margin:0;font-size:14px;font-weight:700;}
  .verified-tag{font-size:9.5px;font-weight:700;color:var(--green-badge-text);background:var(--green-badge-bg);padding:2px 7px;border-radius:20px;}
  .patient-info .id{font-size:11.5px;color:var(--muted);margin-top:2px;}

  .field-group{margin-bottom:20px;}
  .field-label{font-size:11.5px;font-weight:700;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;margin-bottom:8px;display:block;}
  .field-input, .field-textarea{
    width:100%;background:#f6f9f8;border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;font-size:13.5px;color:var(--ink);font-family:inherit;outline:none;
  }
  .field-input:focus, .field-textarea:focus{border-color:var(--teal);}
  .field-textarea{resize:vertical;min-height:64px;}
  .field-input::placeholder, .field-textarea::placeholder{color:#a7b3b1;}

  .field-input.with-icon{padding-left:36px;}
  .icon-field-wrap{position:relative;}
  .icon-field-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);stroke:var(--muted);}

  .severity-row{display:flex;gap:8px;}
  .severity-pill{
    flex:1;text-align:center;padding:9px 0;border-radius:10px;
    font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid transparent;
  }
  .severity-pill[data-level="mild"]{background:var(--mild-bg);color:var(--mild-text);}
  .severity-pill[data-level="moderate"]{background:var(--mod-bg);color:var(--mod-text);}
  .severity-pill[data-level="severe"]{background:var(--sev-bg);color:var(--sev-text);}
  .severity-pill.selected{border-color:currentColor;}

  .attachment-box{
    border:1.5px dashed var(--line);border-radius:14px;
    background:#f6f9f8;
    padding:20px 14px;text-align:center;color:var(--muted);
    font-size:12px;font-weight:600;
    display:flex;flex-direction:column;align-items:center;gap:8px;
    margin-bottom:22px;cursor:pointer;
  }

  .save-btn{
    width:100%;background:var(--teal-dark);color:#fff;border:none;border-radius:12px;
    padding:13px;font-size:13.5px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;
    cursor:pointer;
  }
  .save-btn:hover{background:var(--teal);}

  @media (min-width:600px){
    .screen{max-width:520px;}
  }
</style>
</head>
<body>

<div class="screen">

  <div class="header">
    <div class="header-top">
      <button class="back-btn" onclick="history.back()">&#8592;</button>
      <h1>Add Medical Record</h1>
      <svg class="sync-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>
    </div>
    <div class="header-sub">Patient: Amara (HH-00421 &middot; Record will sync when connected)</div>
  </div>

  <div class="offline-banner">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0f6f66" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>
    Drafting Offline &middot; Record will sync when connected
  </div>

  <div class="body">

    <div class="patient-card">
      <div class="patient-avatar">A</div>
      <div class="patient-info">
        <div class="name-row">
          <h4>Amara</h4>
          <span class="verified-tag">VERIFIED</span>
        </div>
        <div class="id">HH-00421</div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Condition / Diagnosis</label>
      <input class="field-input" type="text" placeholder="Enter diagnosis">
    </div>

    <div class="field-group">
      <label class="field-label">Severity</label>
      <div class="severity-row" id="severityRow">
        <div class="severity-pill" data-level="mild" onclick="selectSeverity(this)">MILD</div>
        <div class="severity-pill" data-level="moderate" onclick="selectSeverity(this)">MODERATE</div>
        <div class="severity-pill" data-level="severe" onclick="selectSeverity(this)">SEVERE</div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Symptoms</label>
      <textarea class="field-textarea" placeholder="Describe symptoms reported by patient"></textarea>
    </div>

    <div class="field-group">
      <label class="field-label">Medication Prescribed</label>
      <div class="icon-field-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7c8c8a" stroke-width="2"><rect x="3" y="8" width="18" height="10" rx="2"/><path d="M3 12h18"/></svg>
        <input class="field-input with-icon" type="text" placeholder="Dosage and medicine name">
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Doctor's Notes</label>
      <textarea class="field-textarea" placeholder="Additional observations and follow-up plan"></textarea>
    </div>

    <div class="attachment-box">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7c8c8a" stroke-width="2"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><circle cx="12" cy="13" r="3"/></svg>
      Secure Clinical Record
    </div>

    <button class="save-btn" onclick="saveRecord()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
      Save Records
    </button>

  </div>

</div>

<script>
  function selectSeverity(pill){
    document.querySelectorAll('.severity-pill').forEach(p => p.classList.remove('selected'));
    pill.classList.add('selected');
  }
  function saveRecord(){
    alert('Record saved locally. It will sync when a connection is available.');
  }
</script>

</body>
</html>
