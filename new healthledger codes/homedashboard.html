<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healthledger</title>
<style>
  :root{
    --teal-dark:#0f6f66;
    --teal:#17a398;
    --mint-bg:#e4f5f3;
    --green-badge-bg:#e5f7e9;
    --green-badge-text:#2fa84f;
    --ink:#1c2b2a;
    --muted:#7c8c8a;
    --line:#eaefee;
    --bg:#f4f7f6;
    --card-shadow:0 2px 10px rgba(20,30,40,0.05);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Helvetica Neue', Arial, sans-serif;
    background:var(--bg);
    color:var(--ink);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  .screen{
    width:100%;
    max-width:420px;
    background:#ffffff;
    box-shadow:0 4px 24px rgba(15,60,55,.06);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  .top-header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 4px 20px;}
  .brand{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--teal-dark);}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);}
  .sync-icon{color:var(--muted);cursor:pointer;}

  .greeting{padding:10px 20px 18px 20px;}
  .greeting h2{margin:0 0 4px 0;font-size:19px;font-weight:700;}
  .greeting p{margin:0;font-size:12px;color:var(--muted);}

  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 20px 18px 20px;}
  .stat-card{
    border:1px solid var(--line);border-radius:14px;padding:12px 8px;text-align:center;
    box-shadow:var(--card-shadow);
  }
  .stat-card.highlight{background:var(--mint-bg);border-color:transparent;}
  .stat-card .num{font-size:19px;font-weight:700;color:var(--ink);}
  .stat-card.highlight .num{color:var(--teal-dark);}
  .stat-card .label{font-size:10.5px;color:var(--muted);margin-top:2px;}

  .search-wrap{padding:0 20px 18px 20px;}
  .search-box{
    background:#f4f5f7;border-radius:14px;
    display:flex;align-items:center;gap:10px;
    padding:12px 14px;
  }
  .search-box input{border:none;background:transparent;outline:none;font-size:13.5px;width:100%;color:var(--ink);}
  .search-box input::placeholder{color:#a7aeb8;}

  .section-label{font-size:12.5px;font-weight:700;color:var(--muted);letter-spacing:.3px;text-transform:uppercase;padding:0 20px 10px 20px;}

  .action-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 20px 22px 20px;}
  .action-card{
    border-radius:14px;padding:16px 12px;display:flex;flex-direction:column;gap:10px;cursor:pointer;
    font-size:12.5px;font-weight:700;
  }
  .action-card.filled{background:var(--teal-dark);color:#fff;}
  .action-card.outline{background:#fff;border:1.5px solid var(--teal);color:var(--teal-dark);}
  .action-card.plain{background:#fff;border:1px solid var(--line);box-shadow:var(--card-shadow);color:var(--ink);}
  .action-card .icon-circle{
    width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  }
  .action-card.filled .icon-circle{background:rgba(255,255,255,.18);}
  .action-card.outline .icon-circle, .action-card.plain .icon-circle{background:var(--mint-bg);}

  .recent-header{display:flex;justify-content:space-between;align-items:center;padding:0 20px 12px 20px;}
  .recent-header h3{margin:0;font-size:15px;font-weight:700;}
  .recent-header a{font-size:12px;color:var(--teal-dark);font-weight:600;text-decoration:none;cursor:pointer;}

  .patient-list{padding:0 20px 20px 20px;display:flex;flex-direction:column;gap:12px;}
  .patient-card{
    display:flex;align-items:center;gap:12px;
    background:#fff;border:1px solid var(--line);box-shadow:var(--card-shadow);
    border-radius:14px;padding:12px 14px;position:relative;
  }
  .patient-card.unverified{border-left:3px solid #d94b4b;}
  .patient-avatar{
    width:42px;height:42px;border-radius:50%;flex-shrink:0;
    background:var(--mint-bg);color:var(--teal-dark);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13.5px;
  }
  .patient-info{flex:1;min-width:0;}
  .patient-info .name-row{display:flex;align-items:center;gap:6px;}
  .patient-info h4{margin:0;font-size:13.5px;font-weight:700;}
  .unverified-tag{font-size:9px;font-weight:700;color:#d94b4b;background:#fbe6e6;padding:2px 6px;border-radius:20px;}
  .patient-info .id{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .visit-info{text-align:right;font-size:10.5px;color:var(--muted);}
  .visit-info .visit-day{font-weight:600;color:var(--ink);}

  .bottom-nav{
    display:flex;justify-content:space-around;align-items:center;
    padding:10px 10px 20px 10px;border-top:1px solid var(--line);background:#ffffff;
    margin-top:auto;
  }
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:#b3b9c2;font-size:10.5px;cursor:pointer;}
  .nav-item.active{color:var(--teal-dark);}
  .nav-item svg{stroke:currentColor;}

  @media (min-width:600px){
    .screen{max-width:520px;}
  }
</style>
</head>
<body>

<div class="screen">

  <div class="top-header">
    <div class="brand"><span class="dot"></span> HealthSync</div>
    <svg class="sync-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>
  </div>

  <div class="greeting">
    <h2>Good morning, Dr Fuashaale</h2>
    <p>Synced 2m ago</p>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="num">47</div>
      <div class="label">Patients</div>
    </div>
    <div class="stat-card highlight">
      <div class="num">12</div>
      <div class="label">Today</div>
    </div>
    <div class="stat-card">
      <div class="num">3</div>
      <div class="label">Pending</div>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#a7aeb8" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" placeholder="Search by name, ID, or location">
    </div>
  </div>

  <div class="section-label">Quick Actions</div>
  <div class="action-grid">
    <div class="action-card filled" onclick="go('register')">
      <div class="icon-circle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg></div>
      Register Patient
    </div>
    <div class="action-card outline" onclick="go('find')">
      <div class="icon-circle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0f6f66" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg></div>
      Find Patient
    </div>
    <div class="action-card plain" onclick="go('record')">
      <div class="icon-circle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0f6f66" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M12 11v6M9 14h6"/></svg></div>
      Add Record
    </div>
    <div class="action-card plain" onclick="go('sync')">
      <div class="icon-circle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0f6f66" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg></div>
      Sync Record
    </div>
  </div>

  <div class="recent-header">
    <h3>Recent Patients</h3>
    <a>View All</a>
  </div>

  <div class="patient-list" id="patientList"></div>

  <div class="bottom-nav">
    <div class="nav-item active" data-page="homedashboard.html" onclick="setNav(this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 10l9-7 9 7v10a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>
      Home
    </div>
    <div class="nav-item" data-page="findpatient.html" onclick="setNav(this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      Search
    </div>
    <div class="nav-item" data-page="patientsearchhistory.html" onclick="setNav(this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h6"/></svg>
      Records
    </div>
    <div class="nav-item" data-page="appsettings.html" onclick="setNav(this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      Profile
    </div>
  </div>

</div>

<script>
  const API_BASE = 'http://localhost:3000/api';
  
  // Get auth token from localStorage
  function getAuthToken() {
    return localStorage.getItem('token');
  }
  
  // Fetch patients from API
  async function loadPatients() {
    const list = document.getElementById('patientList');
    const token = getAuthToken();
    
    if (!token) {
      list.innerHTML = '<div style="text-align:center;padding:20px;color:#7c8c8a;">Please login to view patients</div>';
      return;
    }
    
    try {
      const response = await fetch(`${API_BASE}/patients?limit=10`, {
        headers: {
          'Authorization': `Bearer ${token}`
        }
      });
      
      const result = await response.json();
      
      if (result.success && result.data.length > 0) {
        renderPatients(result.data);
      } else {
        list.innerHTML = '<div style="text-align:center;padding:20px;color:#7c8c8a;">No patients found</div>';
      }
    } catch (error) {
      console.error('Error loading patients:', error);
      list.innerHTML = '<div style="text-align:center;padding:20px;color:#d94b4b;">Error loading patients</div>';
    }
  }
  
  function initials(name){
    return name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
  }
  
  function renderPatients(patients){
    const list = document.getElementById('patientList');
    list.innerHTML = patients.map(p => `
      <div class="patient-card ${p.is_verified ? '' : 'unverified'}">
        <div class="patient-avatar">${initials(p.full_name)}</div>
        <div class="patient-info">
          <div class="name-row">
            <h4>${p.full_name}</h4>
            ${p.is_verified ? '' : '<span class="unverified-tag">UNVERIFIED</span>'}
          </div>
          <div class="id">ID: ${p.patient_id}</div>
        </div>
        <div class="visit-info">
          Last visit<br><span class="visit-day">${formatDate(p.created_at)}</span>
        </div>
      </div>
    `).join('');
  }
  
  function formatDate(dateString) {
    const date = new Date(dateString);
    const now = new Date();
    const diffTime = Math.abs(now - date);
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    
    if (diffDays === 1) return 'Today';
    if (diffDays === 2) return 'Yesterday';
    if (diffDays <= 7) return `${diffDays} days ago`;
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  
  function go(action){ 
    console.log('Navigate to:', action);
    if (action === 'register') {
      window.location.href = 'newpatientstep1.html';
    } else if (action === 'find') {
      window.location.href = 'findpatient.html';
    } else if (action === 'record') {
      window.location.href = 'newpatientregistration.html';
    } else if (action === 'sync') {
      window.location.href = 'cloudsyncstatus.html';
    }
  }
  
  function setNav(item){
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
    const targetPage = item.getAttribute('data-page');
    if (targetPage) {
      window.location.href = targetPage;
    }
  }

  // Load patients when page loads
  loadPatients();
</script>

</body>
</html>
