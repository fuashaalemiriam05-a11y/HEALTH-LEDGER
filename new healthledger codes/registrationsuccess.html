<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Complete</title>
<style>
  :root{
    --teal-dark:#0f6f66;
    --teal:#17a398;
    --mint-bg:#e4f5f3;
    --ink:#1c2b2a;
    --muted:#7c8c8a;
    --line:#eaefee;
    --bg:#f4f7f6;
    --card-shadow:0 2px 10px rgba(20,30,40,0.05);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Helvetica Neue', Arial, sans-serif;
    background:var(--bg);
    color:var(--ink);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  .screen{
    width:100%;
    max-width:420px;
    background:#ffffff;
    box-shadow:0 4px 24px rgba(15,60,55,.06);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  .top-header{display:flex;align-items:center;gap:8px;padding:18px 20px 14px 20px;}
  .brand{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--teal-dark);}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);}

  .body{padding:20px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}

  .check-circle{
    width:84px;height:84px;border-radius:50%;background:var(--mint-bg);
    display:flex;align-items:center;justify-content:center;margin-bottom:22px;
  }
  .check-circle .inner{
    width:60px;height:60px;border-radius:50%;background:var(--teal-dark);
    display:flex;align-items:center;justify-content:center;
  }

  h2{font-size:19px;font-weight:700;margin:0 0 8px 0;}
  .sub{font-size:12.5px;color:var(--muted);line-height:1.6;max-width:280px;margin:0 0 24px 0;}

  .summary-card{
    width:100%;border:1px solid var(--line);border-radius:14px;padding:16px;text-align:left;
    box-shadow:var(--card-shadow);margin-bottom:24px;
  }
  .summary-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);}
  .summary-row:last-child{border-bottom:none;}
  .summary-row .lbl{font-size:11.5px;color:var(--muted);}
  .summary-row .val{font-size:12.5px;font-weight:700;color:var(--teal-dark);}

  .primary-btn{
    width:100%;background:var(--teal-dark);color:#fff;border:none;border-radius:12px;
    padding:13px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:10px;
  }
  .primary-btn:hover{background:var(--teal);}
  .secondary-link{font-size:12px;color:var(--teal-dark);font-weight:700;cursor:pointer;}

  .bottom-nav{
    display:flex;justify-content:space-around;align-items:center;width:100%;
    padding:10px 10px 20px 10px;border-top:1px solid var(--line);background:#ffffff;
    margin-top:auto;
  }
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:#b3b9c2;font-size:10.5px;cursor:pointer;}
  .nav-item.active{color:var(--teal-dark);}
  .nav-item svg{stroke:currentColor;}

  @media (min-width:600px){
    .screen{max-width:520px;}
  }
</style>
</head>
<body>

<div class="screen">

  <div class="top-header">
    <div class="brand"><span class="dot"></span> HealthSync</div>
  </div>

  <div class="body">

    <div class="check-circle">
      <div class="inner">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
    </div>

    <h2>Registration Complete</h2>
    <p class="sub">The patient has been enrolled and their biometric identity has been securely saved.</p>

    <div class="summary-card">
      <div class="summary-row">
        <span class="lbl">Patient</span>
        <span class="val">Amara Lawson</span>
      </div>
      <div class="summary-row">
        <span class="lbl">Health ID</span>
        <span class="val">HS-8829-BK10</span>
      </div>
      <div class="summary-row">
        <span class="lbl">Fingerprint</span>
        <span class="val">Enrolled</span>
      </div>
    </div>

    <button class="primary-btn" onclick="goToProfile()">View Patient Profile</button>
    <div class="secondary-link" onclick="goHome()">Return to Home</div>

  </div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="setNav(this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 10l9-7 9 7v10a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>
      Home
    </div>
    <div class="nav-item" onclick="setNav(this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      Search
    </div>
    <div class="nav-item" onclick="setNav(this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h6"/></svg>
      Records
    </div>
    <div class="nav-item" onclick="setNav(this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      Profile
    </div>
  </div>

</div>

<script>
  function goToProfile(){ alert('Opening patient profile…'); }
  function goHome(){ alert('Returning to home dashboard…'); }
  function setNav(item){
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
  }
</script>

</body>
</html>
