<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Back — Health Ledger</title>
<style>
  :root{
    --teal-dark:#0f6f66;
    --teal:#17a398;
    --mint-bg:#e4f5f3;
    --ink:#1c2b2a;
    --muted:#7c8c8a;
    --line:#eaefee;
    --bg:#f4f7f6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Helvetica Neue', Arial, sans-serif;
    background:var(--bg);
    color:var(--ink);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  .screen{
    width:100%;
    max-width:420px;
    background:#ffffff;
    box-shadow:0 4px 24px rgba(15,60,55,.06);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  .brand-panel{
    background:linear-gradient(160deg,var(--teal),var(--teal-dark));
    color:#fff;
    padding:38px 24px 30px 24px;
    text-align:center;
  }
  .brand-panel .icon-circle{
    width:56px;height:56px;border-radius:16px;background:rgba(255,255,255,.15);
    display:flex;align-items:center;justify-content:center;margin:0 auto 14px auto;
  }
  .brand-panel h1{margin:0 0 4px 0;font-size:20px;font-weight:700;}
  .brand-panel p{margin:0;font-size:11.5px;opacity:.85;}

  .form-panel{padding:26px 24px 24px 24px;flex:1;display:flex;flex-direction:column;}
  .form-panel h2{font-size:18px;font-weight:700;margin:0 0 4px 0;color:var(--teal-dark);}
  .form-panel .sub{font-size:12px;color:var(--muted);margin:0 0 24px 0;}

  .field-group{margin-bottom:16px;}
  .field-label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .field-label{font-size:12px;font-weight:700;color:var(--ink);}
  .field-label-row a{font-size:11.5px;color:var(--teal-dark);text-decoration:none;font-weight:600;}
  .input-wrap{position:relative;}
  .input-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);stroke:var(--muted);}
  .input-wrap .toggle-eye{left:auto;right:12px;cursor:pointer;}
  .field-input{
    width:100%;background:#f6f9f8;border:1px solid var(--line);border-radius:12px;
    padding:12px 14px 12px 36px;font-size:13.5px;color:var(--ink);outline:none;
  }
  .field-input:focus{border-color:var(--teal);}
  .field-input::placeholder{color:#a7b3b1;}

  .signin-btn{
    width:100%;background:var(--teal-dark);color:#fff;border:none;border-radius:12px;
    padding:13px;font-size:13.5px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;
    cursor:pointer;margin-top:6px;
  }
  .signin-btn:hover{background:var(--teal);}

  .divider{text-align:center;color:var(--muted);font-size:11px;margin:18px 0;position:relative;}
  .divider::before{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:var(--line);}
  .divider span{background:#fff;position:relative;padding:0 12px;}

  .biometric-btn{
    width:100%;background:#fff;color:var(--teal-dark);border:1.5px solid var(--teal);border-radius:12px;
    padding:12px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;
    cursor:pointer;
  }
  .biometric-btn:hover{background:var(--mint-bg);}

  .footer{margin-top:auto;padding-top:26px;text-align:center;}
  .footer .signup-line{font-size:12px;color:var(--muted);margin-bottom:14px;}
  .footer .signup-line a{color:var(--teal-dark);font-weight:700;text-decoration:none;}
  .footer .links{font-size:11px;color:var(--muted);}
  .footer .links a{color:var(--muted);text-decoration:none;}

  @media (min-width:600px){
    .screen{max-width:520px;}
  }
</style>
</head>
<body>

<div class="screen">

  <div class="brand-panel">
    <div class="icon-circle">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2"><path d="M12 2l8 3v6c0 5-3.5 8.5-8 11-4.5-2.5-8-6-8-11V5z"/><path d="M12 8v6M9 11h6"/></svg>
    </div>
    <h1>Health Ledger</h1>
    <p>HealthSync Simplified</p>
  </div>

  <div class="form-panel">
    <h2>Welcome</h2>
    <p class="sub">Securely access your health records</p>

    <form id="loginForm">
      <div class="field-group">
        <div class="field-label-row"><span class="field-label">Email or Phone</span></div>
        <div class="input-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
          <input class="field-input" type="text" placeholder="name@health.org">
        </div>
      </div>

      <div class="field-group">
        <div class="field-label-row">
          <span class="field-label">Password</span>
          <a href="#">Forgot Password?</a>
        </div>
        <div class="input-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
          <input class="field-input" type="password" id="pwInput" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
          <svg class="toggle-eye" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" onclick="togglePw()"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
      </div>

      <button type="submit" class="signin-btn">
        Sign In <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>
    </form>

    <div class="divider"><span>or</span></div>

    <button class="biometric-btn" onclick="biometricLogin()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0f6f66" stroke-width="2"><path d="M18 11a4 4 0 1 0-4-4"/><path d="M8 11a4 4 0 1 1 4-4"/><path d="M12 7v3"/><path d="M9 13c-1.5 1-2 2.5-2 4.5V21"/><path d="M15 13c1.5 1 2 2.5 2 4.5V21"/><path d="M12 10v11"/></svg>
      Biometric Login
    </button>

    <div class="footer">
      <p class="signup-line">New to HealthLedger? <a href="#">Sign up</a></p>
      <p class="links"><a href="#">Help Center</a> &nbsp;&middot;&nbsp; <a href="#">Privacy Policy</a></p>
    </div>
  </div>

</div>

<script>
  const API_BASE = 'http://localhost:3000/api';
  
  function togglePw(){
    const input = document.getElementById('pwInput');
    input.type = input.type === 'password' ? 'text' : 'password';
  }
  
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    
    const emailOrPhone = document.querySelector('.field-input[type="text"]').value;
    const password = document.getElementById('pwInput').value;
    
    if (!emailOrPhone || !password) {
      alert('Please enter both email/phone and password');
      return;
    }
    
    try {
      const response = await fetch(`${API_BASE}/auth/login`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ emailOrPhone, password })
      });
      
      const result = await response.json();
      
      if (result.success) {
        // Store token in localStorage
        localStorage.setItem('token', result.token);
        localStorage.setItem('user', JSON.stringify(result.user));
        
        // Redirect to dashboard
        window.location.href = 'homedashboard.html';
      } else {
        alert(result.message || 'Login failed');
      }
    } catch (error) {
      console.error('Login error:', error);
      alert('Unable to connect to server. Please try again.');
    }
  });
  
  function biometricLogin(){
    alert('Biometric login feature coming soon!');
  }
</script>

</body>
</html>
