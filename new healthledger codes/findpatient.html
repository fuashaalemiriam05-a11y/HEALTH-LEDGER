<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Patient</title>
<style>
  :root{
    --teal-dark:#0f6f66;
    --teal:#17a398;
    --mint-bg:#e4f5f3;
    --ink:#1c2b2a;
    --muted:#7c8c8a;
    --line:#eaefee;
    --bg:#f4f7f6;
    --card-shadow:0 2px 10px rgba(20,30,40,0.05);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Helvetica Neue', Arial, sans-serif;
    background:var(--bg);
    color:var(--ink);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  .screen{
    width:100%;
    max-width:420px;
    background:#ffffff;
    box-shadow:0 4px 24px rgba(15,60,55,.06);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  .search-wrap{padding:20px 20px 16px 20px;}
  .search-box{
    background:#f4f5f7;border-radius:14px;
    display:flex;align-items:center;gap:10px;
    padding:12px 14px;
  }
  .search-box input{border:none;background:transparent;outline:none;font-size:13.5px;width:100%;color:var(--ink);}
  .search-box input::placeholder{color:#a7aeb8;}

  .section-label{font-size:12.5px;font-weight:700;color:var(--muted);letter-spacing:.3px;text-transform:uppercase;padding:0 20px 10px 20px;}

  .quick-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:12px;
    padding:0 20px 18px 20px;
  }
  .quick-card{
    background:#fff;border:1px solid var(--line);box-shadow:var(--card-shadow);
    border-radius:14px;padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:10px;
    cursor:pointer;font-size:12.5px;font-weight:600;color:var(--ink);
  }
  .quick-card .icon-circle{
    width:36px;height:36px;border-radius:10px;background:var(--mint-bg);
    display:flex;align-items:center;justify-content:center;
  }

  .callout{
    margin:0 20px 22px 20px;background:var(--mint-bg);border-radius:16px;
    padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;
  }
  .callout .icon-circle{
    width:44px;height:44px;border-radius:12px;background:#fff;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .callout h4{margin:0 0 4px 0;font-size:13.5px;font-weight:700;color:var(--teal-dark);}
  .callout p{margin:0;font-size:11.5px;color:var(--teal-dark);opacity:.8;line-height:1.4;}

  .recent-header{display:flex;justify-content:space-between;align-items:center;padding:0 20px 10px 20px;}
  .recent-header h3{margin:0;font-size:14px;font-weight:700;}
  .recent-header a{font-size:12px;color:var(--teal-dark);font-weight:600;text-decoration:none;cursor:pointer;}

  .recent-list{padding:0 20px 20px 20px;display:flex;flex-direction:column;gap:4px;flex:1;}
  .recent-item{
    display:flex;align-items:center;gap:12px;padding:10px 0;
    border-bottom:1px solid var(--line);cursor:pointer;
  }
  .recent-item:last-child{border-bottom:none;}
  .recent-item .icon-circle{
    width:34px;height:34px;border-radius:50%;background:var(--mint-bg);color:var(--teal-dark);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .recent-item .rtext{flex:1;min-width:0;}
  .recent-item h5{margin:0;font-size:13px;font-weight:700;}
  .recent-item p{margin:2px 0 0 0;font-size:11.5px;color:var(--muted);}

  .fab{
    position:sticky;bottom:78px;align-self:center;
    background:var(--teal-dark);color:#fff;border:none;border-radius:24px;
    padding:11px 20px;font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:8px;
    box-shadow:0 8px 20px rgba(15,60,55,.25);cursor:pointer;margin-bottom:12px;
  }

  .bottom-nav{
    display:flex;justify-content:space-around;align-items:center;
    padding:10px 10px 20px 10px;border-top:1px solid var(--line);background:#ffffff;
    margin-top:auto;
  }
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:#b3b9c2;font-size:10.5px;cursor:pointer;}
  .nav-item.active{color:var(--teal-dark);}
  .nav-item svg{stroke:currentColor;}

  @media (min-width:600px){
    .screen{max-width:520px;}
  }
</style>
</head>
<body>

<div class="screen">

  <div class="search-wrap">
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#a7aeb8" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" placeholder="Name, location, or Health ID">
    </div>
  </div>

  <div class="section-label">Quick Search</div>
  <div class="quick-grid">
    <div class="quick-card" onclick="quickSearch('name')">
      <div class="icon-circle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0f6f66" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg></div>
      By Name
    </div>
    <div class="quick-card" onclick="quickSearch('location')">
      <div class="icon-circle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0f6f66" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
      By Location
    </div>
    <div class="quick-card" onclick="quickSearch('id')">
      <div class="icon-circle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0f6f66" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 9h4M7 13h7"/><circle cx="17" cy="15" r="1.6"/></svg></div>
      Health ID
    </div>
    <div class="quick-card" onclick="quickSearch('photo')">
      <div class="icon-circle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0f6f66" stroke-width="2"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><circle cx="12" cy="13" r="3"/></svg></div>
      By Photo
    </div>
  </div>

  <div class="callout" onclick="registerNew()">
    <div class="icon-circle">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0f6f66" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>
    </div>
    <div>
      <h4>Can't find the patient?</h4>
      <p>Register a new profile to begin their clinical journey.</p>
    </div>
  </div>

  <div class="recent-header">
    <h3>Recent Searches</h3>
    <a onclick="clearRecent()">Clear All</a>
  </div>

  <div class="recent-list" id="recentList">
    <div class="recent-item">
      <div class="icon-circle">JD</div>
      <div class="rtext">
        <h5>Jonathan Doe</h5>
        <p>ID: HS-88421</p>
      </div>
    </div>
    <div class="recent-item">
      <div class="icon-circle">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0f6f66" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="rtext">
        <h5>District 4 Clinic</h5>
        <p>24 Patients listed</p>
      </div>
    </div>
    <div class="recent-item">
      <div class="icon-circle">SC</div>
      <div class="rtext">
        <h5>Sarah Connor</h5>
        <p>ID: HS-11922</p>
      </div>
    </div>
  </div>

  <button class="fab" onclick="findPatient()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
    Find Patient
  </button>

  <div class="bottom-nav">
    <div class="nav-item" onclick="setNav(this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 10l9-7 9 7v10a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>
      Home
    </div>
    <div class="nav-item active" onclick="setNav(this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      Search
    </div>
    <div class="nav-item" onclick="setNav(this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h6"/></svg>
      Records
    </div>
    <div class="nav-item" onclick="setNav(this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      Profile
    </div>
  </div>

</div>

<script>
  function quickSearch(type){
    console.log('Quick search by:', type);
  }
  function registerNew(){
    alert('Opening new patient registration…');
  }
  function clearRecent(){
    document.getElementById('recentList').innerHTML = '<p style="color:#7c8c8a;font-size:12.5px;padding:10px 0;">No recent searches.</p>';
  }
  function findPatient(){
    alert('Searching…');
  }
  function setNav(item){
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
  }
</script>

</body>
</html>
