<!DOCTYPE html>
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Medical Record</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }

    body {
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .page-head {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .offline-status {
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
    }

    .patient-card {
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 22px;
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #0e7490;
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .patient-name {
      font-size: 19px;
      font-weight: 700;
      color: #1a1a2e;
      display: inline;
      margin-right: 8px;
    }

    .verified {
      display: inline-block;
      font-size: 11px;
      background: #16a34a;
      color: #fff;
      padding: 2px 8px;
      border-radius: 6px;
      font-weight: 700;
      vertical-align: middle;
    }

    .patient-id {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
      margin-top: 3px;
    }

  
    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .8px;
      color: #1a1a2e;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    input[type="text"], textarea {
      width: 100%;
      border: 1.5px solid #cbd5e1;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      resize: none;
      background: #fff;
      color: #1a1a2e;
      font-family: inherit;
      outline: none;
    }

    input[type="text"]:focus, textarea:focus {
      border-color: #0e7490;
    }

    textarea { min-height: 85px; }

    
    .severity-options {
      display: flex;
      gap: 10px;
    }

    .severity-btn {
      flex: 1;
      cursor: pointer;
    }

    .severity-btn input[type="radio"] {
      display: none;
    }

    .severity-btn span {
      display: block;
      text-align: center;
      padding: 13px 6px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .5px;
      text-transform: uppercase;
      border: none;
      transition: .2s;
    }

    
    .mild span { background: #b2f0e8; color: #0e7490; }
    .mild input:checked + span { background: #0e9488; color: #fff; outline: 2.5px solid #0e7490; }

    
    .moderate span { background: #fed7aa; color: #c2410c; }
    .moderate input:checked + span { background: #ea580c; color: #fff; outline: 2.5px solid #c2410c; }

    
    .severe span { background: #fecaca; color: #b91c1c; }
    .severe input:checked + span { background: #dc2626; color: #fff; outline: 2.5px solid #b91c1c; }

    
    .security-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      padding: 13px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: .3px;
    }

    
    .save-btn {
      width: 100%;
      border: none;
      background: #0e9488;
      color: #fff;
      padding: 15px;
      border-radius: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .5px;
      text-transform: uppercase;
      transition: .2s;
    }

    .save-btn:hover { background: #0e9488;}
  </style>
</head>
<body>
  
  <div class="container">

    <h1 class="page-head">Add Medical Record</h1>
    <p class="offline-status">Drafting Offline • Record will sync when connected</p>

    <div class="patient-card">
      <div class="avatar">A</div>
      <div>
        <div>
          <span class="patient-name">Amara</span>
          <span class="verified">VERIFIED</span>
        </div>
        <div class="patient-id">HH-00421</div>
      </div>
    </div>

    <form class="record-form">

      <div class="form-group">
        <label>Condition / Diagnosis</label>
        <input type="text" placeholder="Enter diagnosis">
      </div>

      <div class="form-group">
        <label>Severity</label>
        <div class="severity-options">
          <label class="severity-btn mild">
            <input type="radio" name="severity" value="mild" checked="">
            <span>MILD</span>
          </label>
          <label class="severity-btn moderate">
            <input type="radio" name="severity" value="moderate">
            <span>MODERATE</span>
          </label>
          <label class="severity-btn severe">
            <input type="radio" name="severity" value="severe">
            <span>SEVERE</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>Symptoms</label>
        <textarea placeholder="Describe symptoms reported by patient"></textarea>
      </div>

      <div class="form-group">
        <label>Medication Prescribed</label>
        <textarea placeholder="Dosage and medicine name"></textarea>
      </div>

      <div class="form-group">
        <label>Doctor's Notes</label>
        <textarea placeholder="Additional observations and follow-up plan"></textarea>
      </div>

      <div class="security-banner">
        🔒 SECURE CLINICAL RECORD
      </div>

      <button type="submit" class="save-btn">SAVE RECORDS</button>

    </form>
  </div>


</body></html>
